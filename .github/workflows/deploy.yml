name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Push target (GHCR) auth — repo-scoped, no PAT needed.
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # .npmrc for installing private @kagehq/* deps inside the build.
      # GHCR_PAT = a PAT with read:packages access to the @kagehq org.
      - name: Write build .npmrc
        run: |
          {
            echo "@kagehq:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${{ secrets.GHCR_PAT }}"
          } > .npmrc.ci

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secret-files: |
            npmrc=.npmrc.ci
          build-args: |
            VITE_ISSUER_URL=${{ vars.VITE_ISSUER_URL }}
            VITE_RPC_URL=${{ vars.VITE_RPC_URL }}
            VITE_EVENT_ID=${{ vars.VITE_EVENT_ID }}
            VITE_EVENT_NAME=${{ vars.VITE_EVENT_NAME }}
            VITE_PAYER_SECRET=${{ secrets.VITE_PAYER_SECRET }}

      # Tell Dokploy to pull the new image and redeploy.
      - name: Trigger Dokploy redeploy
        run: curl -fsSL -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}"
