name: debug-secret

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/debug-secret.yml
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Hash GHCR_PAT (no value leak)
        env:
          PAT: ${{ secrets.GHCR_PAT }}
        run: |
          echo "len=${#PAT}"
          printf '%s' "$PAT"          | sha256sum | awk '{print "raw    sha:", $1}'
          printf '%s' "$PAT" | tr -d ' \t\r\n' | sha256sum | awk '{print "trimmed sha:", $1}'
          echo "expected sha: c4defcedb49702e70f774761bb986b96499760c60f29deecfea6747712820b3f"
